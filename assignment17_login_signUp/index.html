<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
</head>

<body>
    <h1>Sign Up</h1>
    <input id="sName" type="text" placeholder="Name"><br><br>
    <input id="sEmail" type="email" placeholder="Email"><br><br>
    <input id="sPassword" type="password" placeholder="Password"><br><br>
    <button onclick="signUp()">Sign Up</button><br><br>

    <h1>Login</h1>
    <input id="lEmail" type="email" placeholder="Email"><br><br>
    <input id="lPassword" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button><br><br>

    <hr>


</body>

</html>
