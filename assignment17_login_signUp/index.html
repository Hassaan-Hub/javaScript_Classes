<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo_App</title>
</head>

<body>
  <h2>Signup</h2>
  <input id="name" placeholder="Name"><br><br>
  <input id="email" placeholder="Email"><br><br>
  <input type="password" id="pass" placeholder="Password"><br><br>
  <button onclick="signup()">Sign Up</button><br>

  <h2>Login</h2>
  <input id="lEmail" placeholder="Email"><br><br>
  <input id="lPass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button><br>


  <div id="postSection" style="display: none;">
    <h2>Add Post</h2>
    <input id="postInput" placeholder="write post">
    <button onclick="addPost()">Add</button>
    
    <h2>Posts</h2>
    <div id="posts"></div>
  </div>
  


</body>
<script src="app.js"></script>

</html>
